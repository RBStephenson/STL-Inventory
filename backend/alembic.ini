[alembic]
script_location = alembic

# sqlalchemy.url is NOT used — env.py pulls the URL from the app engine directly.
# Set it here only if you want `alembic` CLI commands (outside the app) to work;
# point it at the same DB your .env resolves to.
# sqlalchemy.url = sqlite:////data/stl_inventory.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
